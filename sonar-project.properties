# Definimos las carpetas generales
sonar.sources=backend,frontend/src

# Archivos incluidos por funcionalidad:
#
# [HU1]  Registro de usuario
#         backend/app.js (POST /api/register)
#         frontend/src/app/pages/login/login.ts
#
# [HU3]  Inicio de sesión con autenticación por correo y contraseña
#         backend/app.js (POST /api/login)
#         frontend/src/app/pages/login/auth.service.ts
#         frontend/src/app/guards/auth-guard.ts
#
# [HU10] Asociación de una planta del banco a la cuenta del usuario
#         backend/app.js (POST /api/registrar-planta, GET /api/plantas)
#         frontend/src/app/pages/registrar-plantas/registrar-plantas.ts
#
# [HU11] Visualización de las plantas registradas por el usuario
#         backend/app.js (GET /api/mis-plantas)
#         frontend/src/app/pages/mis-plantas/mis-plantas.ts
#
# [HU8]  Simulación de riego manual desde la aplicación
#         backend/app.js (POST /api/regar)
#         backend/mqttService.js
#         frontend/src/app/pages/monstera/monstera.ts
#
# [HU19] Registro automático del evento de riego en el historial
#         backend/cuidadosService.js
#         backend/mqttService.js
#         frontend/src/app/pages/monstera/monstera.ts
#
# [HU21] Actualización de lecturas ambientales
#         backend/SimuladorSensor.js
#         backend/mqttService.js
#         frontend/src/app/services/mqtt-data.service.ts
#         frontend/src/app/pages/monstera/monstera.ts
#
# [HU23] Registro de cuidados (poda y fertilización)
#         backend/app.js (POST /api/cuidados)
#         backend/cuidadosService.js
#         frontend/src/app/pages/monstera/monstera.ts
#
sonar.inclusions=\
  backend/app.js,\
  backend/server.js,\
  backend/mqttService.js,\
  backend/SimuladorSensor.js,\
  backend/pkgCentralService.js,\
  backend/cuidadosService.js,\
  frontend/src/app/app.ts,\
  frontend/src/app/guards/auth-guard.ts,\
  frontend/src/app/pages/login/login.ts,\
  frontend/src/app/pages/login/auth.service.ts,\
  frontend/src/app/pages/registrar-plantas/registrar-plantas.ts,\
  frontend/src/app/pages/mis-plantas/mis-plantas.ts,\
  frontend/src/app/pages/monstera/monstera.ts,\
  frontend/src/app/services/mqtt-data.service.ts,\
  frontend/src/app/layouts/public-layout.ts

sonar.sourceEncoding=UTF-8

# Reporte de cobertura generado por Karma y Jest
sonar.javascript.lcov.reportPaths=frontend/coverage/frontend/lcov.info,backend/coverage/lcov.info
sonar.test.inclusions=frontend/**/*.spec.ts,backend/__tests__/**/*.test.js
